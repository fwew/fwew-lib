name: Build and Check
on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - name: install dependencies
        run: go get .
      - name: build
        run: go build -v ./...
      - name: Test with the Go CLI
        run: go test
